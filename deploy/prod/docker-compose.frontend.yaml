 services:
  # 서비스 이름을 'frontend'로 정의 (원하는 이름으로 변경 가능)
  frontend:
    # 이 서비스에 대한 Docker 이미지를 빌드하는 방법을 정의
    build:
      context: ./../../frontend # Dockerfile이 있는 현재 디렉토리를 빌드 컨텍스트로 사용

      args:

        VITE_API_URL: https://api.acslgcs.com  
        ENVIRONMENT: production

    image: my-frontend-app:latest

    ports:
      - "3000:80"
