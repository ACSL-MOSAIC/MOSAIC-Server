services:
  db:
    image: postgres:17
    restart: always # <-- db м„ңл№„мҠӨ мһҗмІҙмқҳ restart мҳөм…ҳ (мқҙкұҙ мҳ¬л°”лҰ„)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - app-db-data:/var/lib/postgresql/data/pgdata
    env_file:
      - .env
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_DB=${POSTGRES_DB?Variable not set}
    ports:
      - "${POSTGRES_PORT}:5432"

  prestart:
    image: '${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}'
    build:
      context: ./../../backend
    networks:
      - default
    depends_on:
      db:
        condition: service_healthy # <-- conditionмқҖ мҳ¬л°”лҘё depends_on мҳөм…ҳ
        # restart: true  # <-- мқҙ лқјмқёмқ„ м ңкұ°н–ҲмҠөлӢҲлӢӨ.
    command: bash scripts/prestart.sh
    env_file:
      - .env
    environment:
      - DOMAIN=${DOMAIN}
      - FRONTEND_HOST=${FRONTEND_HOST?Variable not set}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - SECRET_KEY=${SECRET_KEY?Variable not set}
      - FIRST_SUPERUSER=${FIRST_SUPERUSER?Variable not set}
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD?Variable not set}
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
    # prestart м„ңл№„мҠӨ мһҗмІҙм—җ restart м •мұ…мқҙ н•„мҡ”н•ҳл©ҙ м—¬кё°м—җ м¶”к°Җн•ҳм„ёмҡ”.
    # restart: on-failure # мҳҲмӢң

  backend:
    image: '${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}'
    restart: always # <-- backend м„ңл№„мҠӨ мһҗмІҙмқҳ restart мҳөм…ҳ (мқҙкұҙ мҳ¬л°”лҰ„)
    networks:
      - default
    depends_on:
      db:
        condition: service_healthy # <-- conditionмқҖ мҳ¬л°”лҘё depends_on мҳөм…ҳ
        # restart: true  # <-- мқҙ лқјмқёмқ„ м ңкұ°н–ҲмҠөлӢҲлӢӨ.
      prestart:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - DOMAIN=${DOMAIN}
      - FRONTEND_HOST=${FRONTEND_HOST?Variable not set}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - SECRET_KEY=${SECRET_KEY?Variable not set}
      - FIRST_SUPERUSER=${FIRST_SUPERUSER?Variable not set}
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD?Variable not set}
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/utils/health-check/"]
      interval: 10s
      timeout: 5s
      retries: 5
    build:
      context: ./../../backend
    ports:
      - "8000:8000"

volumes:
  app-db-data:
