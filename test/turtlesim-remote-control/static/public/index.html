<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/index.css"/>
    <title>TurtleSim Remote Control</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.3/css/bulma.min.css">
    <style>
        .controls {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-top: 2.0rem;
        }

        .controls_row {
            display: flex;
            flex-direction: row;
            justify-content: center;
        }

        .blank_control {
            width: 60px;
            height: 60px;
        }

        .control_button {
            width: 60px;
            height: 60px;
        }

        button {
            padding: 15px;
            font-size: 18px;
            cursor: pointer;
            border: 2px solid #333;
            border-radius: 8px;
            background-color: #f0f0f0;
        }

        button:hover {
            background-color: #ddd;
        }

        button:active {
            background-color: #ccc;
        }

        .disconnect_button {
            grid-column: 2;
            grid-row: 2;
            background-color: #ff6b6b;
            color: white;
        }

        .disconnect_button:hover {
            background-color: #ff5252;
        }

        .disconnect_button:active {
            background-color: #ff3838;
        }
    </style>
</head>
<body>
<section class="section">
    <div class="content">
        <div id="header-container">
            <h1>ACSL</h1>
            <h2>TurtleSim Remote Control</h2>
        </div>
        <div style="display: flex; flex-direction: row;">
            <div class="box" style="flex: 1; margin-right: 1.0rem">
                <h2>Remote Controller</h2>
                <div class="controls" id="controlBox">
                    <div class="controls_row">
                        <div class="blank_control"></div>
                        <button class="control_button" id="up">↑</button>
                        <div class="blank_control"></div>
                    </div>
                    <div class="controls_row">
                        <button class="control_button" id="left">←</button>
                        <button class="control_button disconnect_button" id="disconnect">■</button>
                        <button class="control_button" id="right">→</button>
                    </div>
                    <div class="controls_row">
                        <div class="blank_control"></div>
                        <button class="control_button" id="down">↓</button>
                        <div class="blank_control"></div>
                    </div>
                </div>
            </div>
            <div class="box" style="flex: 1; margin-right: 1.0rem; margin-bottom: 1.5rem">
                <h2>Position</h2>
                <p id="position"></p>
            </div>
            <div class="box" style="flex: 1; margin-bottom: 1.5rem">
                <div style="display: flex; align-items: center;">
                    <h2>Camera</h2>
                    <p id="fps" style="margin-left: 1.0rem">0 fps</p>
                </div>
                <div class="box" style="min-height: 250px; border: #333333">
                    <video id="remoteVideo" playsinline autoplay></video>
                </div>
            </div>
        </div>

        <div class="box">
            <h2>Connected Robots</h2>

            <div id="robotsList" style="margin-bottom: 1.0rem">
                No robots connected
            </div>

            <div>
                <button id="connect">Connect</button>
            </div>
        </div>

    </div>
</section>
<script src="/static/index.js"></script>
</body>
</html>
