<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direction Controls</title>
    <style>
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(4, 60px);
            gap: 5px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        button {
            padding: 15px;
            font-size: 18px;
            cursor: pointer;
            border: 2px solid #333;
            border-radius: 8px;
            background-color: #f0f0f0;
        }

        button:hover {
            background-color: #ddd;
        }

        button:active {
            background-color: #ccc;
        }

        #up {
            grid-column: 2;
            grid-row: 1;
        }

        #left {
            grid-column: 1;
            grid-row: 2;
        }

        #right {
            grid-column: 3;
            grid-row: 2;
        }

        #down {
            grid-column: 2;
            grid-row: 3;
        }

        #stop {
            grid-column: 2;
            grid-row: 2;
            background-color: #ff6b6b;
            color: white;
        }

        #stop:hover {
            background-color: #ff5252;
        }

        #stop:active {
            background-color: #ff3838;
        }
    </style>
</head>
<body>
    <div class="controls" id="control_box" style="display: none;">
        <button id="up">↑</button>
        <button id="left">←</button>
        <button id="stop">■</button>
        <button id="right">→</button>
        <button id="down">↓</button>
    </div>

    <script defer>

        function disableAllButtons() {
            const buttons = document.querySelectorAll('button');
            buttons.forEach(button => {
                button.disabled = true;
                button.style.opacity = '0.5';
                button.style.cursor = 'not-allowed';
            });
        }

        function enableAllButtons() {
            const buttons = document.querySelectorAll('button');
            buttons.forEach(button => {
                button.disabled = false;
            });
        }

        async function sendDirection(direction) {
            try {
                const response = await fetch(`/direction/${direction}`, {
                    method: 'PUT'
                });
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                console.log(`${direction} command sent successfully`);
            } catch (error) {
                console.error('Error sending direction:', error);
            }
        }
        // disableAllButtons();

        document.getElementById('up').addEventListener('click', () => {
            sendDirection('w');
        });

        document.getElementById('down').addEventListener('click', () => {
            sendDirection('s');
        });

        document.getElementById('left').addEventListener('click', () => {
            sendDirection('a');
        });

        document.getElementById('right').addEventListener('click', () => {
            sendDirection('d');
        });

        document.getElementById('stop').addEventListener('click', () => {
            sendDirection('q');
        });

        const eventSource = new EventSource('/events');
        eventSource.onmessage = function(event) {
            if (event.data == "enable_buttons") {
                var boxes = document.getElementById('control_box');
                boxes.style.display = '';
            } else if (event.data == "disable_buttons") {
                var boxes = document.getElementById('control_box');
                boxes.style.display = 'none';
            }
        }

    </script>
</body>
</html>
