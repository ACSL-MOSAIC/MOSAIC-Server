[uwsgi]
http = 0.0.0.0:3001
module = server:app
master = true
processes = 1
https = 0.0.0.0:3001,/etc/letsencrypt/live/acslgcs.com/fullchain.pem,/etc/letsencrypt/live/acslgcs.com/privkey.pem

# Logging to syslog
logger = syslog
log-syslog = true
log-syslog-prefix = uwsgi-p2p-video-calling

# Optional settings
vacuum = true
